name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate Pacman
        run: |
          mkdir -p dist
          curl -o dist/pacman-contribution-graph.svg https://raw.githubusercontent.com/abozanona/pacman-contribution-graph/main/pacman.svg
          curl -o dist/pacman-contribution-graph-dark.svg https://raw.githubusercontent.com/abozanona/pacman-contribution-graph/main/pacman-dark.svg

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
