name: Generate Pacman Graph

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Create output directory
        run: mkdir -p output
      
      - name: Generate Pacman Graph
        run: |
          curl -o output/pacman-contribution-graph.svg "https://ghchart.rshah.org/Mohamed22-Dev"
          cp output/pacman-contribution-graph.svg output/pacman-contribution-graph-dark.svg
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
